# Local service stack (M6). Operated by the repository owner.
#
#   docker compose up -d db redis        # infrastructure only
#   docker compose run --rm api uv run alembic upgrade head   # apply migrations
#   docker compose up api worker         # application
#
# The offline core, tests, and `ai-eval demo` need NONE of this — they run on SQLite with no
# services. This stack exists for the persistence/API/worker deployment.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ai_eval
      POSTGRES_PASSWORD: ai_eval
      POSTGRES_DB: ai_eval
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_eval"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://ai_eval:ai_eval@db:5432/ai_eval
      REDIS_URL: redis://redis:6379/0
      AI_EVAL_EXECUTION_MODE: celery
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["uv", "run", "celery", "-A", "ai_eval.workers.celery_app", "worker", "--loglevel=info"]
    environment:
      DATABASE_URL: postgresql+psycopg://ai_eval:ai_eval@db:5432/ai_eval
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
